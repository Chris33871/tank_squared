<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Trajectory Visualizer</title>
    <style>
        /* Vertical slider styling for the launch angle */
        .vertical-slider {
            writing-mode: bt-lr; /* Changes the slider orientation to vertical */
            -webkit-appearance: slider-vertical;
            width: 10px; /* Width of the slider */
            height: 200px; /* Height of the slider */
        }
        #canvas {
            border: 1px solid black; /* Adds a border around the canvas for visibility */
        }
    </style>
</head>
<body>
    <h2>Projectile Trajectory Calculator</h2>
    <form id="trajectoryForm">
        <!-- Slider for controlling initial velocity with display value -->
        <label for="velocity">Initial Velocity (m/s):</label>
        <input type="range" id="velocity" min="0" max="100" value="50">
        <span id="velocityValue">50</span> m/s <!-- Shows current velocity value -->
        <br><br>
        
        <!-- Slider for controlling launch angle with display value -->
        <label for="angle">Launch Angle (degrees):</label>
        <input type="range" id="angle" min="0" max="90" value="45" class="vertical-slider">
        <span id="angleValue">45</span>° <!-- Shows current angle value -->
        <br><br>
        
        <!-- Input for gravity value -->
        <label for="gravity">Gravity (m/s²):</label>
        <input type="number" id="gravity" value="9.81" required>
    </form>

    <h3>Results</h3>
    <!-- Results display -->
    <p id="timeOfFlight">Time of Flight: </p>
    <p id="maxHeight">Maximum Height: </p>
    <p id="range">Range: </p>

    <!-- Button to trigger the projectile motion animation -->
    <button onclick="fireProjectile()">Fire</button>

    <!-- Canvas to visually display the trajectory and projectile motion -->
    <canvas id="canvas" width="850" height="450"></canvas>

    <script>
        // Define global variables to store input values and animation ID
        let velocity, angle, gravity, timeOfFlight;
        let animationId;

        // Function to update trajectory calculations based on slider inputs
        function updateTrajectory() {
            velocity = parseFloat(document.getElementById("velocity").value); // Get velocity
            angle = parseFloat(document.getElementById("angle").value); // Get angle
            gravity = parseFloat(document.getElementById("gravity").value); // Get gravity

            // Update displayed values for velocity and angle
            document.getElementById("velocityValue").innerText = velocity;
            document.getElementById("angleValue").innerText = angle;

            // Convert angle to radians for calculations
            const angleRadians = angle * (Math.PI / 180);

            // Calculate time of flight, max height, and range using projectile motion formulas
            timeOfFlight = (2 * velocity * Math.sin(angleRadians)) / gravity;
            const maxHeight = Math.pow(velocity * Math.sin(angleRadians), 2) / (2 * gravity);
            const range = (Math.pow(velocity, 2) * Math.sin(2 * angleRadians)) / gravity;

            // Display calculated values
            document.getElementById("timeOfFlight").innerText = `Time of Flight: ${timeOfFlight.toFixed(2)} s`;
            document.getElementById("maxHeight").innerText = `Maximum Height: ${maxHeight.toFixed(2)} m`;
            document.getElementById("range").innerText = `Range: ${range.toFixed(2)} m`;

            // Draw the trajectory on the canvas
            drawTrajectory(velocity, angleRadians, gravity, timeOfFlight);
        }

        // Function to draw the trajectory path on the canvas
        function drawTrajectory(velocity, angle, gravity, timeOfFlight) {
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear previous drawings

            const scale = 0.8; // Scale factor to fit trajectory on canvas
            const timeStep = 0.02; // Small time increment for drawing path points

            ctx.beginPath();
            ctx.moveTo(0, canvas.height); // Start from bottom left of the canvas

            // Loop to draw each point along the path until time of flight
            for (let t = 0; t <= timeOfFlight; t += timeStep) {
                const x = velocity * Math.cos(angle) * t; // x position
                const y = velocity * Math.sin(angle) * t - 0.5 * gravity * t * t; // y position

                // Convert to canvas coordinates (invert y for canvas)
                const canvasX = x * scale;
                const canvasY = canvas.height - (y * scale);

                ctx.lineTo(canvasX, canvasY); // Draw line to the next point
            }

            ctx.strokeStyle = "blue"; // Set color for trajectory path
            ctx.lineWidth = 2; // Set line width
            ctx.stroke(); // Render the path
        }

        // Function to animate the projectile motion when "Fire" button is clicked
        function fireProjectile() {
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            const scale = 0.8; // Scaling factor for canvas coordinates
            const angleRadians = angle * (Math.PI / 180); // Convert angle to radians
            const startX = 0; // Initial x position
            const startY = canvas.height; // Initial y position (canvas bottom)
            let t = 0; // Start time
            const timeStep = 0.2; // Time increment per frame for animation

            cancelAnimationFrame(animationId); // Stop any previous animation

            // Function to handle each animation frame
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas

                // Draw the trajectory path as a reference
                drawTrajectory(velocity, angleRadians, gravity, timeOfFlight);

                // Calculate projectile's current x and y based on physics
                const x = velocity * Math.cos(angleRadians) * t;
                const y = velocity * Math.sin(angleRadians) * t - 0.5 * gravity * t * t;

                // Convert to canvas coordinates
                const canvasX = startX + x * scale;
                const canvasY = startY - y * scale;

                // Draw the projectile as an orange circle
                ctx.beginPath();
                ctx.arc(canvasX, canvasY, 15, 0, 2 * Math.PI); // Circle with radius 15
                ctx.fillStyle = "orange";
                ctx.fill();
                ctx.closePath();

                // Continue animation if the projectile is above the ground
                if (y >= 0) {
                    t += timeStep; // Advance time
                    animationId = requestAnimationFrame(animate); // Request next frame
                }
            }

            animate(); // Start the animation
        }

        // Event listeners to update the trajectory whenever sliders are adjusted
        document.getElementById("velocity").addEventListener("input", updateTrajectory);
        document.getElementById("angle").addEventListener("input", updateTrajectory);
        document.getElementById("gravity").addEventListener("input", updateTrajectory);

        updateTrajectory(); // Initial call to set up trajectory display
    </script>
</body>
</html>
